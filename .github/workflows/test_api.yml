name: API Connection Test

on:
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install eptr2
        run: pip install eptr2

      - name: Test EPİAŞ API via eptr2
        env:
          EPTR_USERNAME: ${{ secrets.EPIAS_USERNAME }}
          EPTR_PASSWORD: ${{ secrets.EPIAS_PASSWORD }}
        run: |
          python << 'PYEOF'
          import os
          from eptr2 import EPTR2

          print("=== EPİAŞ API Test (eptr2) ===")

          eptr = EPTR2(
              username=os.environ["EPTR_USERNAME"],
              password=os.environ["EPTR_PASSWORD"]
          )

          # GÖP MCP (PTF)
          print("\n1. GÖP MCP (PTF) test...")
          try:
              res = eptr.call("mcp", start_date="2026-04-10", end_date="2026-04-12")
              print(f"   BASARILI! Tip: {type(res)}")
              print(f"   Sonuc: {str(res)[:300]}")
          except Exception as e:
              print(f"   HATA: {e}")

          # DGP SMP
          print("\n2. DGP SMP test...")
          try:
              res = eptr.call("smp", start_date="2026-04-10", end_date="2026-04-12")
              print(f"   BASARILI! {str(res)[:200]}")
          except Exception as e:
              print(f"   HATA: {e}")

          # Üretim
          print("\n3. Uretim test...")
          try:
              res = eptr.call("realtimegeneration", start_date="2026-04-10", end_date="2026-04-12")
              print(f"   BASARILI! {str(res)[:200]}")
          except Exception as e:
              print(f"   HATA: {e}")

          # Mevcut call listesi
          print("\n4. Mevcut call'lar (ilk 20)...")
          try:
              calls = eptr.get_available_calls()
              print(f"   {list(calls)[:20]}")
          except Exception as e:
              print(f"   HATA: {e}")

          print("\n=== Test tamamlandi ===")
          PYEOF
