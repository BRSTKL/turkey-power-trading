name: API Connection Test

on:
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install eptr2 pandas

      - name: Test EPİAŞ API via eptr2
        env:
          EPTR_USERNAME: ${{ secrets.EPIAS_USERNAME }}
          EPTR_PASSWORD: ${{ secrets.EPIAS_PASSWORD }}
        run: |
          python << 'PYEOF'
          import os
          import pandas as pd
          from eptr2 import EPTR2

          eptr = EPTR2(
              username=os.environ["EPTR_USERNAME"],
              password=os.environ["EPTR_PASSWORD"]
          )

          # Tüm call listesini al
          calls = eptr.get_available_calls()
          all_calls = list(calls)
          print(f"Toplam call sayisi: {len(all_calls)}")
          print("\nTUM CALL LISTESI:")
          for c in sorted(all_calls):
              print(f"  {c}")

          # Üretim ile ilgili olanları filtrele
          print("\n--- URETIM ile ilgili ---")
          for c in sorted(all_calls):
              if any(k in c.lower() for k in ["gen", "uretim", "realtime", "production", "uevm"]):
                  print(f"  {c}")

          # Tüketim ile ilgili
          print("\n--- TUKETIM ile ilgili ---")
          for c in sorted(all_calls):
              if any(k in c.lower() for k in ["consumption", "tuketim", "load", "demand"]):
                  print(f"  {c}")

          # Dengesizlik ile ilgili
          print("\n--- DENGESIZLIK ile ilgili ---")
          for c in sorted(all_calls):
              if any(k in c.lower() for k in ["imbalance", "dengesiz", "bpm", "direction", "system"]):
                  print(f"  {c}")

          PYEOF
