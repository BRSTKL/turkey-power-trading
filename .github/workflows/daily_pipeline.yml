name: Daily Data Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Kaç gün geriye gidilsin?'
        required: false
        default: '7'

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/raw data/processed

      - name: Run full pipeline
        env:
          EPIAS_USERNAME: ${{ secrets.EPIAS_USERNAME }}
          EPIAS_PASSWORD: ${{ secrets.EPIAS_PASSWORD }}
        run: |
          python << 'PYEOF'
          import os
          from datetime import datetime, timedelta
          from eptr2 import EPTR2
          import pandas as pd
          from pathlib import Path

          PROCESSED = Path("data/processed")
          USERNAME = os.environ["EPIAS_USERNAME"]
          PASSWORD = os.environ["EPIAS_PASSWORD"]
          DAYS = int(os.environ.get("DAYS_BACK", "7"))

          end_date   = datetime.today().strftime("%Y-%m-%d")
          start_date = (datetime.today() - timedelta(days=DAYS)).strftime("%Y-%m-%d")

          print(f"Pipeline: {start_date} → {end_date}")

          eptr = EPTR2(username=USERNAME, password=PASSWORD)

          # 1. GÖP MCP
          print("\n[1/3] GÖP MCP...")
          try:
              res = eptr.call("mcp", start_date=start_date, end_date=end_date)
              df = res if isinstance(res, pd.DataFrame) else pd.DataFrame(res)
              df.to_csv(PROCESSED / f"gop_mcp_{start_date.replace('-','')}.csv", index=False, encoding="utf-8-sig")
              print(f"  OK: {len(df)} kayit")
          except Exception as e:
              print(f"  HATA: {e}")

          # 2. DGP SMP
          print("\n[2/3] DGP SMP...")
          try:
              res = eptr.call("smp", start_date=start_date, end_date=end_date)
              df = res if isinstance(res, pd.DataFrame) else pd.DataFrame(res)
              df.to_csv(PROCESSED / f"dgp_{start_date.replace('-','')}.csv", index=False, encoding="utf-8-sig")
              print(f"  OK: {len(df)} kayit")
          except Exception as e:
              print(f"  HATA: {e}")

          # 3. Üretim
          print("\n[3/3] Uretim...")
          try:
              res = eptr.call("realtimegeneration", start_date=start_date, end_date=end_date)
              df = res if isinstance(res, pd.DataFrame) else pd.DataFrame(res)
              df.to_csv(PROCESSED / f"uretim_{start_date.replace('-','')}.csv", index=False, encoding="utf-8-sig")
              print(f"  OK: {len(df)} kayit")
          except Exception as e:
              print(f"  HATA: {e}")

          print("\nPipeline tamamlandi!")
          PYEOF

      - name: Upload data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-${{ github.run_number }}
          path: data/processed/
          retention-days: 90

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/processed/ || true
          git diff --staged --quiet || git commit -m "data: daily update $(date +'%Y-%m-%d')"
          git push || true
