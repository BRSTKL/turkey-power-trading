name: Daily Data Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Kaç gün geriye gidilsin?'
        required: false
        default: '7'

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install eptr2 pandas pyarrow loguru

      - name: Create data directories
        run: mkdir -p data/raw data/processed

      - name: Run full pipeline
        env:
          EPIAS_USERNAME: ${{ secrets.EPIAS_USERNAME }}
          EPIAS_PASSWORD: ${{ secrets.EPIAS_PASSWORD }}
          DAYS_BACK: ${{ github.event.inputs.days_back || '7' }}
        run: |
          python << 'PYEOF'
          import os
          import pandas as pd
          from datetime import datetime, timedelta
          from pathlib import Path
          from eptr2 import EPTR2

          PROCESSED = Path("data/processed")
          DAYS = int(os.environ.get("DAYS_BACK", "7"))
          end_date   = datetime.today().strftime("%Y-%m-%d")
          start_date = (datetime.today() - timedelta(days=DAYS)).strftime("%Y-%m-%d")
          tag = start_date.replace("-", "")

          print(f"=== Pipeline: {start_date} → {end_date} ({DAYS} gün) ===\n")

          eptr = EPTR2(
              username=os.environ["EPIAS_USERNAME"],
              password=os.environ["EPIAS_PASSWORD"]
          )

          def fetch_and_save(call_name, filename, label):
              print(f"[{label}] {call_name}...")
              try:
                  res = eptr.call(call_name, start_date=start_date, end_date=end_date)
                  df = res if isinstance(res, pd.DataFrame) else pd.DataFrame(res.get("items", res))
                  df.to_csv(PROCESSED / filename, index=False, encoding="utf-8-sig")
                  print(f"  OK: {len(df)} kayit → {filename}")
                  return df
              except Exception as e:
                  print(f"  HATA: {e}")
                  return None

          # 1. GÖP MCP
          fetch_and_save("mcp", f"gop_mcp_{tag}.csv", "1/7 GÖP MCP")

          # 2. DGP SMP + yön
          fetch_and_save("smp", f"dgp_smp_{tag}.csv", "2/7 DGP SMP")
          fetch_and_save("smp-dir", f"dgp_smp_dir_{tag}.csv", "3/7 DGP Yön")

          # 3. GÖP+DGP+İmbalance birleşik
          fetch_and_save("mcp-smp-imb", f"mcp_smp_imb_{tag}.csv", "4/7 MCP-SMP-İmbalance")

          # 4. Gerçekleşen üretim (kaynak bazlı)
          fetch_and_save("uevm", f"uretim_uevm_{tag}.csv", "5/7 UEVM Üretim")

          # 5. Gerçek zamanlı tüketim
          fetch_and_save("rt-cons", f"tuketim_{tag}.csv", "6/7 Tüketim")

          # 6. BPM talimatları
          fetch_and_save("bpm-up",   f"bpm_up_{tag}.csv",   "7a/7 BPM Yük Alma")
          fetch_and_save("bpm-down", f"bpm_down_{tag}.csv", "7b/7 BPM Yük Atma")

          # 7. İmbalance miktarı
          fetch_and_save("imb-qty", f"imbalance_{tag}.csv", "7c/7 İmbalance Miktarı")

          # 8. Rüzgar tahmini (bonus)
          fetch_and_save("wind-forecast", f"wind_forecast_{tag}.csv", "BONUS Rüzgar Tahmini")

          # Master tablo: tüm CSV'leri listele
          files = list(PROCESSED.glob("*.csv"))
          print(f"\n=== Tamamlandi! {len(files)} dosya üretildi ===")
          for f in sorted(files):
              size = f.stat().st_size / 1024
              print(f"  {f.name} ({size:.1f} KB)")
          PYEOF

      - name: Upload data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-${{ github.run_number }}
          path: data/processed/
          retention-days: 90

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/processed/ || true
          git diff --staged --quiet || git commit -m "data: daily update $(date +'%Y-%m-%d')"
          git push || true
