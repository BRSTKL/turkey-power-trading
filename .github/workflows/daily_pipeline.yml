name: Daily Data Pipeline

on:
  schedule:
    # Her gün 06:00 UTC = 09:00 Türkiye
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Kaç gün geriye gidilsin? (ilk kurulum için 30, sonra boş bırak)'
        required: false
        default: '1'

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install eptr2 pandas loguru

      - name: Create data directories
        run: mkdir -p data/raw data/processed

      - name: Run full pipeline
        env:
          EPIAS_USERNAME: ${{ secrets.EPIAS_USERNAME }}
          EPIAS_PASSWORD: ${{ secrets.EPIAS_PASSWORD }}
          DAYS_BACK: ${{ github.event.inputs.days_back || '1' }}
        run: |
          python << 'PYEOF'
          import os, time
          import pandas as pd
          from datetime import datetime, timedelta
          from pathlib import Path
          from eptr2 import EPTR2

          PROCESSED = Path("data/processed")
          DAYS = int(os.environ.get("DAYS_BACK", "1"))

          # DAYS=1 → sadece dün
          # DAYS=30 → ilk kurulum için son 30 gün
          end_date   = datetime.today().strftime("%Y-%m-%d")
          start_date = (datetime.today() - timedelta(days=DAYS)).strftime("%Y-%m-%d")

          print(f"=== Pipeline: {start_date} → {end_date} ({DAYS} gün) ===\n")

          eptr = EPTR2(
              username=os.environ["EPIAS_USERNAME"],
              password=os.environ["EPIAS_PASSWORD"]
          )

          def fetch_and_append(call_name, master_file, label, retries=2):
              print(f"[{label}] {call_name}...")
              for attempt in range(retries):
                  try:
                      res = eptr.call(call_name, start_date=start_date, end_date=end_date)
                      df_new = res if isinstance(res, pd.DataFrame) else pd.DataFrame(res.get("items", res))
                      if df_new.empty:
                          print(f"  UYARI: Boş veri")
                          return None
                      master_path = PROCESSED / master_file
                      if master_path.exists():
                          df_old = pd.read_csv(master_path)
                          df_combined = pd.concat([df_old, df_new], ignore_index=True)
                          date_col = df_combined.columns[0]
                          df_combined = df_combined.drop_duplicates(subset=[date_col], keep="last")
                          df_combined = df_combined.sort_values(date_col).reset_index(drop=True)
                      else:
                          df_combined = df_new
                      df_combined.to_csv(master_path, index=False, encoding="utf-8-sig")
                      print(f"  OK: +{len(df_new)} yeni | Toplam: {len(df_combined)} kayıt")
                      return df_combined
                  except Exception as e:
                      if attempt < retries - 1:
                          print(f"  Tekrar deneniyor... ({e})")
                          time.sleep(10)
                      else:
                          print(f"  HATA: {e}")
                          return None

          fetch_and_append("mcp",         "master_gop_mcp.csv",     "1/7 GÖP MCP")
          fetch_and_append("smp",         "master_dgp_smp.csv",     "2/7 DGP SMP")
          fetch_and_append("smp-dir",     "master_dgp_smp_dir.csv", "3/7 DGP Yön")
          fetch_and_append("mcp-smp-imb", "master_mcp_smp_imb.csv", "4/7 MCP-SMP-İmb")
          fetch_and_append("rt-cons",     "master_tuketim.csv",     "5/7 Tüketim")
          fetch_and_append("bpm-up",      "master_bpm_up.csv",      "6/7 BPM Yük Alma")
          fetch_and_append("bpm-down",    "master_bpm_down.csv",    "7/7 BPM Yük Atma")

          result = fetch_and_append("rt-gen", "master_uretim.csv", "BONUS Üretim")
          if result is None:
              fetch_and_append("ren-rt-gen", "master_uretim.csv", "BONUS Üretim (fallback)")

          fetch_and_append("wind-forecast", "master_wind_forecast.csv", "BONUS Rüzgar")

          files = list(PROCESSED.glob("master_*.csv"))
          print(f"\n=== Tamamlandı! {len(files)} master dosya ===")
          for f in sorted(files):
              df = pd.read_csv(f)
              print(f"  {f.name}: {len(df)} toplam kayıt")
          PYEOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-${{ github.run_number }}
          path: data/processed/master_*.csv
          retention-days: 90

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/processed/master_*.csv || true
          git diff --staged --quiet || git commit -m "data: update $(date +'%Y-%m-%d')"
          git push || true
